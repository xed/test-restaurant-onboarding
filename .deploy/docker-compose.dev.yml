services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-180s}
      READ_TIMEOUT: ${READ_TIMEOUT:-10s}
      WRITE_TIMEOUT: ${WRITE_TIMEOUT:-240s}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    ports:
      - "8080:8080"
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  go-mod-cache:
  go-build-cache:

networks:
  app-network:
    driver: bridge
